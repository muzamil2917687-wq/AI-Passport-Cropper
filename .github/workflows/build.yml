name: Build Windows Application
on: [push]
jobs:
  build:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    - name: Install Dependencies
      run: |
        pip install pyinstaller opencv-python mediapipe pillow numpy
    - name: Compile EXE Software
      run: |
        pyinstaller --onefile --noconsole main.py
    - name: Upload Desktop App Deliverable
      uses: actions/upload-artifact@v4
      with:
        name: AI_Passport_Photo_Cropper_EXE
        path: dist/main.exe
